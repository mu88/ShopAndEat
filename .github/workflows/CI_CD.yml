name: Combined CI / Release

on:
  workflow_dispatch:
  push:
    branches:
      - '**'

jobs:
  temporary_security_pin_guard:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Enforce temporary package pins
        uses: mu88/common/.github/actions/check-temporary-package-pins@10f96e34f55796997ce898228c5a4d41b5d3db5e
        with:
          solution-path: ShopAndEat.slnx

  shared_ci_cd:
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write

    needs: temporary_security_pin_guard

    uses: mu88/common/.github/workflows/ci-cd.yml@b2b64ff794f717b127ca29a51803998e25453854
    with:
      docker-attest-provenance-and-sbom: true
      docker-publish-project: ShopAndEat/ShopAndEat.csproj
      requires-docker-login: true
      sonar-key: mu88_ShopAndEat
    secrets:
      sonar-token: ${{ secrets.SONAR_TOKEN }}
