<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      color: #333;
      margin: 0;
      padding: 24px;
      min-width: 400px;
      max-width: 600px;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      margin: 0 0 20px;
    }

    label {
      display: block;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .help {
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      height: 100px;
      font-family: monospace;
      font-size: 13px;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      resize: vertical;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
    }

    button {
      padding: 6px 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
    }

    button#save {
      background: #1a73e8;
      border-color: #1a73e8;
      color: #fff;
    }

    button#save:hover {
      background: #1765cc;
    }

    button#reset:hover {
      background: #f5f5f5;
    }

    #status {
      font-size: 13px;
      color: #188038;
    }
  </style>
</head>
<body>
  <h1 data-i18n="optionsTitle"></h1>

  <label for="bridgeHosts" data-i18n="optionsBridgeHostsLabel"></label>
  <p class="help" data-i18n="optionsBridgeHostsHelp"></p>
  <textarea id="bridgeHosts" spellcheck="false"></textarea>

  <div class="actions">
    <button id="save" data-i18n="optionsSave"></button>
    <button id="reset" data-i18n="optionsReset"></button>
    <span id="status"></span>
  </div>

  <script src="options.js"></script>
</body>
</html>
